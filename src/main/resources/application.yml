spring:
  application:
    name: ecommerce-monolith

  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: ecommerce
    password: ecommerce
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Schema padrão usado quando nenhum profile específico está ativo
        default_schema: public
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/v1

  data:
    redis:
      host: localhost
      port: 6379

# Recomendações (Redis) — valores obrigatórios; a app não sobe se faltar algum
app:
  recommendation:
    customer-history-ttl: 30d
    suggestion-limit: 5

# SpringDoc OpenAPI (Swagger) Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
# Profile para módulo Product
spring:
  config:
    activate:
      on-profile: product
  
  jpa:
    properties:
      hibernate:
        default_schema: product_schema

---
# Profile para módulo Customer
spring:
  config:
    activate:
      on-profile: customer
  
  jpa:
    properties:
      hibernate:
        default_schema: customer_schema

---
# Profile para módulo Order
spring:
  config:
    activate:
      on-profile: order
  
  jpa:
    properties:
      hibernate:
        default_schema: order_schema

---
# Profile para módulo Payment
spring:
  config:
    activate:
      on-profile: payment
  
  jpa:
    properties:
      hibernate:
        default_schema: payment_schema

spring:
  application:
    name: ecommerce-monolith

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ecommerce
    username: ecommerce
    password: ecommerce

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: ecommerce
    password: ecommerce
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/v1
    url: jdbc:postgresql://localhost:5432/ecommerce
    user: ecommerce
    password: ecommerce

  data:
    redis:
      host: localhost
      port: 6379

app:
  recommendation:
    customer-history-ttl: 30d
    suggestion-limit: 5

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  metrics:
    probe-interval-ms: 30000
    enable:
      jvm: true
      process: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[app.postgres.ping]": true
        "[app.redis.ping]": true
        "[jvm.gc.pause]": true
        "[http.server.requests]": true
      percentiles:
        "[app.postgres.ping]": 0.95, 0.99
        "[app.redis.ping]": 0.95, 0.99
        "[jvm.gc.pause]": 0.95, 0.99
        "[http.server.requests]": 0.5, 0.95, 0.99
      minimum-expected-value:
        "[app.postgres.ping]": 1ms
        "[app.redis.ping]": 1ms
      maximum-expected-value:
        "[app.postgres.ping]": 2s
        "[app.redis.ping]": 500ms
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    r2dbc:
      enabled: true
    redis:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

spring:
  r2dbc:
    url: r2dbc:postgresql://postgres:5432/ecommerce
    username: ecommerce
    password: ecommerce
    pool:
      enabled: true
      initial-size: 10
      max-size: 50

  datasource:
    url: jdbc:postgresql://postgres:5432/ecommerce
    username: ecommerce
    password: ecommerce
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    url: jdbc:postgresql://postgres:5432/ecommerce
    user: ecommerce
    password: ecommerce

  data:
    redis:
      host: redis
      port: 6379
